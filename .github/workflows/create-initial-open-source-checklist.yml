name: Create initial open source checklist

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issue:
    if: github.repository != 'SchweizerischeBundesbahnen/open-source-repo-template'
    runs-on: ubuntu-latest

    steps:
      - name: Create initial checklist issue if missing
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Initial open source readiness checklist';
            const content = await github.rest.repos.getContent({
              owner,
              repo,
              path: '.github/open-source-bootstrap-checklist.md',
            });

            const body = Buffer.from(content.data.content, content.data.encoding).toString('utf8').trim();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });

            const existingIssue = issues.find((issue) => issue.title === title && !issue.pull_request);

            if (existingIssue) {
              core.notice(`Checklist issue already exists: #${existingIssue.number}`);
              return;
            }

            const { data: newIssue } = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

            core.notice(`Created checklist issue #${newIssue.number}`);